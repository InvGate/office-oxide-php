name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            # ext-php-rs builds on stable for Linux.
            rust: stable
            ext: target/release/liboffice_oxide_php.so
          - name: windows-x64
            os: windows-latest
            # Windows requires nightly for the `abi_vectorcall` feature.
            rust: nightly
            ext: target/release/office_oxide_php.dll

    steps:
      - uses: actions/checkout@v4

      # PHP 8.4, non-thread-safe. Provides php, phpize and php-config so
      # ext-php-rs can locate the PHP headers to build against.
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
        env:
          phpts: nts

      # libclang is required by ext-php-rs's bindgen step.
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"
          directory: ${{ runner.temp }}/llvm

      - name: Export libclang path
        shell: bash
        run: echo "LIBCLANG_PATH=${{ runner.temp }}/llvm/lib" >> "$GITHUB_ENV"

      - name: Install Rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Run PHP smoke test
        shell: bash
        run: php -d extension="$PWD/${{ matrix.ext }}" tests/php/smoke.php

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: office_oxide_php-${{ matrix.name }}-php8.4-nts
          path: ${{ matrix.ext }}
          if-no-files-found: error
