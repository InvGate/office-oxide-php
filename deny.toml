# cargo-deny policy for office_oxide_php (MIT OR Apache-2.0 project).
# License allow-list derived from `cargo deny list` over the dependency tree.
[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses present across the dependency tree.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0", # webpki-root-certs, via ext-php-rs build-dep ureq
    "Unlicense",
    "bzip2-1.0.6",         # libbz2-rs-sys, via zip
]
confidence-threshold = 0.9

[bans]
# The dependency tree carries a few duplicated transitive versions; not worth failing CI over.
multiple-versions = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
